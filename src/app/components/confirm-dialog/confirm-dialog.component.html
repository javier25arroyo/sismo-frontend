<div class="overlay" *ngIf="visible" (click)="onCancel()">
  <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="confirm-title" (click)="stopPropagation($event)">
    <h2 id="confirm-title">{{ title }}</h2>
    <p>{{ message }}</p>
    <div class="actions">
      <button class="cancel" (click)="onCancel()">{{ cancelText }}</button>
      <button class="confirm" (click)="onConfirm()">{{ confirmButtonText }}</button>
    </div>
  </div>
</div>
