<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/55 px-4 backdrop-blur-sm"
  *ngIf="visible"
  (click)="onCancel()"
>
  <div
    class="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl ring-1 ring-slate-200"
    role="dialog"
    aria-modal="true"
    aria-labelledby="confirm-title"
    (click)="stopPropagation($event)"
  >
    <h2 id="confirm-title" class="text-xl font-semibold tracking-tight text-slate-900">{{ title }}</h2>
    <p class="mt-3 text-sm leading-6 text-slate-600">{{ message }}</p>
    <div class="mt-6 flex justify-end gap-3">
      <button
        class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 transition hover:border-slate-400 hover:bg-slate-50"
        (click)="onCancel()"
      >
        {{ cancelText }}
      </button>
      <button
        class="rounded-xl bg-rose-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-700"
        (click)="onConfirm()"
      >
        {{ confirmButtonText }}
      </button>
    </div>
  </div>
</div>
