<section class="login">
  <h1>Login</h1>
  <form (submit)="onSubmit($event)">
    <label>
      Email
      <input type="email" name="email" required />
    </label>
    <label>
      Password
      <input type="password" name="password" required />
    </label>
    <app-button type="submit">Entrar</app-button>
    <div class="error" aria-live="polite">{{ error }}</div>
  </form>
</section>
