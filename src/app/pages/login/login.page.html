<section class="mx-auto max-w-md rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
  <div>
    <span class="text-sm font-semibold uppercase tracking-[0.2em] text-sky-700">Acceso</span>
    <h1 class="mt-3 text-3xl font-semibold tracking-tight text-slate-900">Acceso</h1>
    <p class="mt-3 text-sm leading-6 text-slate-600">
      Ingresa tus credenciales para iniciar sesión.
    </p>
  </div>

  <form class="mt-8 space-y-5" (submit)="onSubmit($event)">
    <label class="block">
      <span class="mb-2 block text-sm font-medium text-slate-700">Correo electrónico</span>
      <input
        type="email"
        name="email"
        required
        class="block w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
      />
    </label>

    <label class="block">
      <span class="mb-2 block text-sm font-medium text-slate-700">Contraseña</span>
      <input
        type="password"
        name="password"
        required
        class="block w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-sky-500 focus:ring-2 focus:ring-sky-200"
      />
    </label>

    <div class="pt-2">
      <app-button type="submit">{{ loading ? 'Entrando...' : 'Entrar' }}</app-button>
    </div>

    <div class="min-h-6 text-sm font-medium text-rose-600" aria-live="polite">{{ error }}</div>
  </form>
</section>
